global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: '${TRIVELA_ENV:-dev}'

rule_files:
  - 'alerting/alerting_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'trivela-backend'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:3001']
    metrics_path: /metrics

  - job_name: 'trivela-rpc-health'
    scrape_interval: 30s
    metrics_path: /health/rpc
    static_configs:
      - targets: ['backend:3001']

  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
