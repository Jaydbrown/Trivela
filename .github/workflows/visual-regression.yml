name: Visual Regression Tests

on:
  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/.storybook/**'
      - 'frontend/tests/visual/**'
      - 'frontend/package*.json'
  push:
    branches:
      - main
    paths:
      - 'frontend/src/**'
      - 'frontend/.storybook/**'
      - 'frontend/tests/visual/**'
  workflow_dispatch:

jobs:
  visual-tests:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        working-directory: frontend
        run: npm run test:visual

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: frontend/playwright-report-visual/
          retention-days: 30

      - name: Upload diff images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            frontend/tests/visual/__snapshots__/**/*-diff.png
            frontend/tests/visual/__snapshots__/**/*-actual.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🖼️ Visual Regression Tests Failed

Visual differences detected! Please review the diff images in the [workflow artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).

**If the visual changes are intentional:**
1. Run \`npm run test:visual:update\` locally
2. Review and commit the updated snapshots
3. Push the changes

**If the changes are unexpected:**
Investigate the cause of the visual regression before merging.`
            });
